<!DOCTYPE html>
<html>
<head>
  <title>waigdt</title>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/sidebar.css">
</head>
<body>

<div class="container" id="container">
  <div class="input-wrapper">
    <input class="input-box" type="text" placeholder="What am i gonna do today" id="taskInput" autocomplete="off" />
  </div>
  <div class="tasks" id="taskList"></div>
  <span class="hint">press enter to add a task</span>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header"><span>History</span></div>
  <div class="history-list" id="historyList"></div>
  <div class="settings-section" id="settingsSection">
    <div class="settings-header" id="settingsToggle"></div>
    <div class="settings-body" id="settingsBody">
      <div class="settings-body-inner">
        <div class="setting-row">
          <span class="setting-label">Background colour</span>
          <input type="color" class="setting-color" id="bgColorPicker" value="#ffffff">
        </div>
        <div class="setting-row">
          <span class="setting-label">Sound effects</span>
          <label class="toggle">
            <input type="checkbox" id="soundToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="sidebar-toggle" id="sidebarToggle"></button>
<button class="theme-toggle" id="themeToggle"></button>

<!-- Scripts load in dependency order -->
<script src="scripts/storage.js"></script>
<script src="scripts/tasks.js"></script>
<script src="scripts/history.js"></script>
<script src="scripts/settings.js"></script>
<script src="scripts/main.js"></script>

</body>
</html>
